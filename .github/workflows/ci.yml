name: CI
on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      webadmin: ${{ steps.filter.outputs.webadmin }}
      python: ${{ steps.filter.outputs.python }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          filters: |
            webadmin:
              - 'apps/web/**'
              - 'apps/admin/**'
              - 'packages/**'
              - 'pnpm-lock.yaml'
            python:
              - 'services/**'
              - 'requirements*.txt'
              - '**/requirements.txt'

  web-admin:
    needs: changes
    if: ${{ needs.changes.outputs.webadmin == 'true' || github.event_name == 'push' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Node & pnpm
      - uses: pnpm/action-setup@v4
        with: { version: 9 }
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      # pnpm store cache (speeds up installs)
      - name: Resolve pnpm store path
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV
      - uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - run: pnpm install --frozen-lockfile
      - run: pnpm turbo lint
      - run: pnpm turbo build

  py-smoke:
    needs: changes
    if: ${{ needs.changes.outputs.python == 'true' || github.event_name == 'push' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }

      # pip cache
      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('services/**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - run: python -m pip install --upgrade pip
      - run: python -m pip install -r services/analyzer/requirements.txt
      - run: python -m pip install -r services/executor/requirements.txt

      # Imports must compile; fail fast if env-required code runs at import time
      - name: Import FastAPI apps
        run: |
          python - << 'PY'
          import importlib, sys
          sys.path.insert(0,'.')
          importlib.import_module('services.analyzer.main')
          importlib.import_module('services.executor.main')
          print('ok')
          PY
name: CI
on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [develop]

jobs:
  web-admin:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 9 }
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - run: pnpm install --frozen-lockfile
      - run: pnpm turbo lint
      - run: pnpm turbo build

  py-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: python -m pip install -r services/analyzer/requirements.txt
      - run: python -m pip install -r services/executor/requirements.txt
      - name: FastAPI schema check (import compiles)
        run: |
          python - << 'PY'
          import importlib; import sys
          sys.path.insert(0,'.')
          importlib.import_module('services.analyzer.main')
          importlib.import_module('services.executor.main')
          print('ok')
          PY

name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        runtime: [node, python]
        node-version: [20]
        python-version: ['3.11']
    steps:
      - uses: actions/checkout@v4

      - name: Setup PNPM
        if: matrix.runtime == 'node'
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        if: matrix.runtime == 'node'
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'pnpm'

      - name: Install Node deps
        if: matrix.runtime == 'node'
        run: pnpm install --frozen-lockfile

      - name: Lint (Node)
        if: matrix.runtime == 'node'
        run: pnpm lint

      - name: Build (Node)
        if: matrix.runtime == 'node'
        run: pnpm build

      - name: Setup Python
        if: matrix.runtime == 'python'
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Python deps (analyzer)
        if: matrix.runtime == 'python'
        run: |
          python -m pip install --upgrade pip
          pip install -r services/analyzer/requirements.txt

      - name: Install Python deps (executor)
        if: matrix.runtime == 'python'
        run: |
          pip install -r services/executor/requirements.txt

      - name: Lint/Test (Python)
        if: matrix.runtime == 'python'
        run: |
          python -m pip install ruff pytest
          ruff check services
          pytest -q || echo "No tests yet"

