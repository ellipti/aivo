name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        runtime: [node, python]
        node-version: [20]
        python-version: ['3.11']
    steps:
      - uses: actions/checkout@v4

      - name: Setup PNPM
        if: matrix.runtime == 'node'
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        if: matrix.runtime == 'node'
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'pnpm'

      - name: Install Node deps
        if: matrix.runtime == 'node'
        run: pnpm install --frozen-lockfile

      - name: Lint (Node)
        if: matrix.runtime == 'node'
        run: pnpm lint

      - name: Build (Node)
        if: matrix.runtime == 'node'
        run: pnpm build

      - name: Setup Python
        if: matrix.runtime == 'python'
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Python deps (analyzer)
        if: matrix.runtime == 'python'
        run: |
          python -m pip install --upgrade pip
          pip install -r services/analyzer/requirements.txt

      - name: Install Python deps (executor)
        if: matrix.runtime == 'python'
        run: |
          pip install -r services/executor/requirements.txt

      - name: Lint/Test (Python)
        if: matrix.runtime == 'python'
        run: |
          python -m pip install ruff pytest
          ruff check services
          pytest -q || echo "No tests yet"

