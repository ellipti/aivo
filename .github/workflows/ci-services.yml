name: CI Services

on:
  pull_request:
    branches: [ develop, main ]
    paths:
      - 'services/**'

jobs:
  analyzer:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install deps (analyzer)
        run: |
          python -m pip install --upgrade pip
          pip install -r services/analyzer/requirements.txt
          pip install pyflakes
      - name: Static checks (analyzer)
        run: python -m pyflakes services/analyzer || true

  executor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install deps (executor)
        run: |
          python -m pip install --upgrade pip
          pip install -r services/executor/requirements.txt
          pip install pyflakes
      - name: Static checks (executor)
        run: python -m pyflakes services/executor || true

